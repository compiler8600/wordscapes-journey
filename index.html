<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0228">
<!-- Android ses kanalını müzik olarak ayarla (Capacitor için) -->
<!-- MainActivity.java içine ekle: setVolumeControlStream(AudioManager.STREAM_MUSIC); -->
<meta name="android-audio-type" content="music">
<title>WordScapes Journey</title>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;height:-webkit-fill-available;overflow:hidden;
  background:#0a2e1a;font-family:'Segoe UI',system-ui,sans-serif}
body{display:flex;justify-content:center;align-items:flex-start}

/* ── APP SHELL ── */
#app{
  width:100%;max-width:430px;
  height:100vh;height:-webkit-fill-available;
  position:relative;overflow:hidden;
  background:transparent;
}

/* ══════════════════════════════
   CANVAS ARKA PLAN
══════════════════════════════ */
#bgCanvas{
  position:fixed;
  top:0;left:50%;
  transform:translateX(-50%);
  width:100%;max-width:430px;
  height:100%;
  z-index:0;
  pointer-events:none;
  display:block;
}

/* ── SCREENS ── */
.scr{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  display:none;flex-direction:column;align-items:center;
  z-index:1;
  background:transparent;
}
.scr.on{display:flex}

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#sHome{justify-content:center;align-items:center;gap:0;padding-bottom:60px}
.h-top{position:absolute;top:14px;right:14px}
.h-musicBtn{
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:44px;height:44px;color:#fff;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.h-gem{
  font-size:clamp(60px,17vw,80px);
  filter:drop-shadow(0 0 28px #f5c842);
  animation:gemBob 3s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes gemBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.h-title{
  font-size:clamp(28px,8vw,40px);font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,#f5c842,#fff8c0,#f5c842);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.h-sub{
  color:#9b8cc4;font-size:clamp(10px,2.8vw,13px);
  letter-spacing:4px;text-transform:uppercase;margin-bottom:34px;
}
.h-playbtn{
  background:linear-gradient(135deg,#f5c842,#e8a800);
  color:#1a0533;border:none;border-radius:50px;
  padding:clamp(15px,4vw,20px) clamp(55px,15vw,80px);
  font-size:clamp(18px,5vw,22px);font-weight:900;cursor:pointer;
  box-shadow:0 6px 28px #f5c84260,0 2px 0 #9a6c00;
  letter-spacing:2px;transition:transform .12s;
}
.h-playbtn:active{transform:scale(.93)}
.h-progwrap{
  width:clamp(180px,55vw,220px);height:7px;
  background:rgba(255,255,255,.1);border-radius:10px;
  overflow:hidden;margin:22px 0 8px;
}
.h-prog{height:100%;background:linear-gradient(90deg,#f5c842,#f953c6);border-radius:10px;transition:width .6s}
.h-info{color:#9b8cc4;font-size:clamp(11px,3.2vw,14px)}

/* ══════════════════════════════
   LEVEL MAP SCREEN
══════════════════════════════ */
#sLevels{justify-content:flex-start}
.lm-hdr{
  width:100%;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:clamp(12px,4vw,16px) 14px clamp(10px,3vw,12px);
  background:rgba(0,0,0,.4);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.lm-back{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:clamp(36px,10vw,42px);height:clamp(36px,10vw,42px);
  color:#fff;font-size:clamp(18px,5vw,22px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.lm-title{color:#f5c842;font-size:clamp(16px,4.5vw,20px);font-weight:800;flex:1;text-align:center}
.lm-coinbox{
  display:flex;align-items:center;gap:4px;
  background:rgba(245,200,66,.14);padding:6px 11px;
  border-radius:18px;color:#f5c842;font-weight:700;
  font-size:clamp(12px,3.5vw,15px);flex-shrink:0;
}
/* scrollable world list */
.lm-body{
  flex:1;width:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 12px clamp(20px,6vw,32px);
}
.world-card{
  margin-bottom:22px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:14px 12px 12px;
}
.world-label{
  display:flex;align-items:center;gap:8px;
  margin-bottom:12px;
}
.world-label .wicon{font-size:20px}
.world-label .wname{color:#fff;font-size:clamp(13px,3.8vw,15px);font-weight:700}
.world-label .wrange{color:#9b8cc4;font-size:11px;margin-left:auto}
/* 5-column grid */
.lvl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(5px,2vw,9px)}
.lvlbtn{
  aspect-ratio:1;border-radius:12px;border:none;
  font-weight:700;font-size:clamp(11px,3.2vw,14px);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .1s;
}
.lvlbtn:active{transform:scale(.86)}
.lvlbtn.done{background:linear-gradient(135deg,#f5c842,#e8a800);color:#1a0533}
.lvlbtn.open{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;box-shadow:0 0 12px #4facfe40}
.lvlbtn.lock{background:rgba(255,255,255,.06);color:rgba(255,255,255,.22);cursor:default}
.lvlbtn .star{font-size:8px;margin-top:1px}

/* ══════════════════════════════
   GAME SCREEN
══════════════════════════════ */
#sGame{justify-content:flex-start}
.g-hdr{
  width:100%;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(10px,3vw,14px) 13px clamp(8px,2.5vw,10px);
  background:rgba(0,0,0,.45);border-bottom:1px solid rgba(255,255,255,.08);
}
.g-back{
  background:none;border:none;color:#9b8cc4;
  font-size:clamp(20px,6vw,26px);cursor:pointer;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
}
.g-mid{text-align:center}
.g-lvlnum{color:#f5c842;font-size:clamp(13px,3.8vw,16px);font-weight:800;line-height:1.2}
.g-worldname{color:#9b8cc4;font-size:clamp(10px,2.8vw,12px)}
.g-right{display:flex;align-items:center;gap:7px}
.g-coins{
  display:flex;align-items:center;gap:4px;
  background:rgba(245,200,66,.13);padding:5px 10px;
  border-radius:16px;color:#f5c842;font-weight:700;
  font-size:clamp(12px,3.5vw,15px);
}
.g-hintbtn{
  background:rgba(79,172,254,.15);border:1.5px solid rgba(79,172,254,.3);
  border-radius:50%;width:clamp(30px,8.5vw,36px);height:clamp(30px,8.5vw,36px);
  color:#4facfe;font-size:clamp(14px,4vw,18px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* crossword — koyu arka plan ki kareler öne çıksın */
.g-cw{
  flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:10px;overflow:hidden;
  background:rgba(0,0,0,.3);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.cwgrid{display:inline-grid;gap:4px}
.cell{
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;font-weight:800;color:#fff;
  transition:all .28s cubic-bezier(.36,.07,.19,.97);
}
.cell.emp{background:transparent}
.cell.blk{
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.55);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 2px 6px rgba(0,0,0,.4);
}
.cell.fnd{
  background:linear-gradient(135deg,#f5c842,#e8a800);
  color:#1a0533;border:2px solid #f5c842;
  box-shadow:0 0 10px #f5c84240;
  animation:cPop .32s ease both;
}
.cell.bon{
  background:linear-gradient(135deg,#f953c6,#c471ed);
  color:#fff;border:2px solid #f953c6;
  box-shadow:0 0 10px #f953c640;
  animation:cPop .32s ease both;
}
@keyframes cPop{0%{transform:scale(.45)}65%{transform:scale(1.18)}100%{transform:scale(1)}}

/* word pills */
.g-pills{
  width:100%;flex-shrink:0;
  padding:3px 10px;min-height:38px;
  display:flex;flex-wrap:wrap;gap:5px;
  justify-content:center;align-items:center;
}
.pill{
  border-radius:20px;padding:3px 11px;
  font-size:clamp(10px,3vw,12px);letter-spacing:1.5px;
  font-weight:600;border:1.5px solid;transition:all .25s;
}
.pill.ph{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#9b8cc4}
.pill.pf{background:rgba(245,200,66,.14);border-color:#f5c842;color:#f5c842}
.pill.pb{background:rgba(249,83,198,.14);border-color:#f953c6;color:#f953c6}

/* wheel area */
.g-wheel{
  flex-shrink:0;width:100%;
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:4px 0 clamp(14px,4vw,22px);
}
.g-typed{
  height:clamp(28px,8vw,36px);
  display:flex;align-items:center;justify-content:center;gap:3px;
}
.tletter{
  width:clamp(22px,6.5vw,30px);height:clamp(22px,6.5vw,30px);
  background:rgba(255,255,255,.14);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:clamp(12px,3.8vw,16px);font-weight:800;
  animation:tlP .12s ease both;
}
@keyframes tlP{0%{transform:scale(0) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}

.wheelwrap{position:relative;flex-shrink:0}
#wsvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#wdiv{position:absolute;top:0;left:0}
.wletter{
  position:absolute;border-radius:50%;
  background:linear-gradient(135deg,#2d0a6e,#4a1299);
  border:2.5px solid rgba(255,255,255,.22);
  color:#fff;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transform:translate(-50%,-50%);
  transition:background .12s,transform .12s,box-shadow .12s;
  box-shadow:0 4px 14px rgba(0,0,0,.5);
  touch-action:none;
}
.wletter.sel{
  background:linear-gradient(135deg,#f5c842,#e8a800);
  color:#1a0533;border-color:#f5c842;
  transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 0 20px #f5c84270;
}
.wshuf{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:linear-gradient(135deg,#f953c6,#c471ed);
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px #f953c660;transition:transform .12s;
}
.wshuf:active{transform:translate(-50%,-50%) scale(.86)!important}
.g-actrow{display:flex;gap:clamp(14px,5vw,22px);margin-top:4px}
.g-act{
  background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.17);
  border-radius:50%;
  width:clamp(38px,11vw,46px);height:clamp(38px,11vw,46px);
  color:#fff;font-size:clamp(16px,4.8vw,20px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.g-act:active{transform:scale(.85);background:rgba(255,255,255,.2)}

/* ══════════════════════════════
   WIN SCREEN
══════════════════════════════ */
#sWin{justify-content:center;align-items:center;gap:0;padding:30px 20px}
.w-trophy{font-size:clamp(64px,18vw,84px);animation:wBob 1s ease-in-out infinite alternate}
@keyframes wBob{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-14px) scale(1.08)}}
.w-title{
  font-size:clamp(26px,8vw,36px);font-weight:900;margin:10px 0 4px;
  background:linear-gradient(135deg,#f5c842,#fff5c0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.w-sub{color:#9b8cc4;font-size:clamp(12px,3.5vw,15px);margin-bottom:6px}
.w-earncoins{color:#f5c842;font-size:clamp(15px,4.5vw,19px);font-weight:700;margin-bottom:26px}
.w-nextbtn{
  background:linear-gradient(135deg,#f5c842,#e8a800);color:#1a0533;
  border:none;border-radius:50px;
  padding:clamp(14px,4vw,18px) clamp(48px,14vw,70px);
  font-size:clamp(16px,4.8vw,20px);font-weight:900;cursor:pointer;
  box-shadow:0 4px 22px #f5c84260;margin-bottom:12px;display:block;width:80%;text-align:center;
}
.w-mapbtn{
  background:rgba(255,255,255,.1);color:#fff;
  border:1.5px solid rgba(255,255,255,.2);border-radius:50px;
  padding:clamp(11px,3.3vw,15px) clamp(36px,11vw,52px);
  font-size:clamp(13px,3.8vw,16px);font-weight:600;cursor:pointer;
  display:block;width:80%;text-align:center;
}

/* ── TOAST ── */
#toast{
  position:fixed;top:44%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  padding:clamp(9px,2.8vw,13px) clamp(20px,6vw,28px);
  border-radius:30px;font-size:clamp(13px,3.8vw,15px);font-weight:800;
  z-index:9999;pointer-events:none;white-space:nowrap;
  transition:all .22s cubic-bezier(.36,.07,.19,.97);
}
#toast.on{transform:translate(-50%,-50%) scale(1)}
#toast.tg{background:linear-gradient(135deg,#f5c842,#e8a800);color:#1a0533;box-shadow:0 4px 22px #f5c84260}
#toast.tb{background:linear-gradient(135deg,#f953c6,#c471ed);color:#fff;box-shadow:0 4px 22px #f953c660}
#toast.tr{background:rgba(30,20,65,.92);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.14)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

/* ══════════════════════════════
   FOOTER (on Home screen)
══════════════════════════════ */
.h-footer{
  position:absolute;bottom:0;left:0;width:100%;
  display:flex;justify-content:center;gap:clamp(10px,4vw,18px);
  padding:12px 12px clamp(12px,4vw,20px);
  background:rgba(0,0,0,.25);
  flex-wrap:wrap;
}
.h-footer button{
  background:none;border:none;color:#9b8cc4;
  font-size:clamp(10px,2.8vw,12px);cursor:pointer;
  text-decoration:underline;text-underline-offset:3px;
  padding:2px 0;transition:color .15s;
}
.h-footer button:active{color:#f5c842}

/* ══════════════════════════════
   LEGAL / INFO PAGES
══════════════════════════════ */
#sLegal{justify-content:flex-start;background:linear-gradient(170deg,#0f0228 0%,#1a0540 55%,#2d0a6e 100%)}
.leg-hdr{
  width:100%;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:clamp(12px,4vw,16px) 14px clamp(10px,3vw,12px);
  background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.07);
}
.leg-back{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:40px;height:40px;color:#fff;font-size:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.leg-title{color:#f5c842;font-size:clamp(15px,4.5vw,19px);font-weight:800;flex:1;text-align:center}
.leg-body{
  flex:1;width:100%;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:20px 18px clamp(24px,7vw,40px);
}
.leg-body h2{color:#f5c842;font-size:clamp(13px,3.8vw,15px);font-weight:800;margin:20px 0 8px;letter-spacing:.5px;text-transform:uppercase}
.leg-body h2:first-child{margin-top:0}
.leg-body p{color:#c8bfe8;font-size:clamp(12px,3.4vw,14px);line-height:1.75;margin-bottom:10px}
.leg-body a{color:#4facfe;text-decoration:none}
.leg-body a:active{text-decoration:underline}
.leg-body .badge{display:inline-block;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);color:#f5c842;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;margin-bottom:14px}
.leg-body .contact-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;margin:10px 0}
.leg-body .contact-card p{margin:0;line-height:1.6}
.leg-body .contact-card .clabel{color:#9b8cc4;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.leg-body .contact-card .cval{color:#fff;font-size:clamp(13px,3.8vw,15px);font-weight:600}
.leg-body hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:16px 0}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="app">

  <!-- ── HOME ── -->
  <div id="sHome" class="scr on">
    <div class="h-top">
      <button class="h-musicBtn" id="musicBtn" onclick="toggleMusic()">🎵</button>
    </div>
    <div class="h-gem">💎</div>
    <div class="h-title">WORDSCAPES</div>
    <div class="h-sub">Journey · 1000 Levels</div>
    <button class="h-playbtn" onclick="gotoLevels()">▶ &nbsp;PLAY</button>
    <div class="h-progwrap"><div class="h-prog" id="hProg" style="width:0%"></div></div>
    <div class="h-info" id="hInfo">0 / 1000 levels completed</div>
    <!-- ── FOOTER (home screen only) ── -->
    <div class="h-footer">
      <button onclick="openLegal('about')">About</button>
      <button onclick="openLegal('howtoplay')">How to Play</button>
      <button onclick="openLegal('privacy')">Privacy Policy</button>
      <button onclick="openLegal('terms')">Terms of Service</button>
      <button onclick="openLegal('contact')">Contact</button>
    </div>
  </div>

  <!-- ── LEGAL / INFO SCREEN ── -->
  <div id="sLegal" class="scr">
    <div class="leg-hdr">
      <button class="leg-back" onclick="closeLegal()">‹</button>
      <div class="leg-title" id="legTitle">About</div>
    </div>
    <div class="leg-body" id="legBody"></div>
  </div>

  <!-- ── LEVEL MAP ── -->
  <div id="sLevels" class="scr">
    <div class="lm-hdr">
      <button class="lm-back" onclick="gotoHome()">‹</button>
      <div class="lm-title">🗺 Level Map</div>
      <div class="lm-coinbox">🪙 <span id="lmCoins">0</span></div>
    </div>
    <div class="lm-body" id="lmBody"></div>
  </div>

  <!-- ── GAME ── -->
  <div id="sGame" class="scr">
    <div class="g-hdr">
      <button class="g-back" onclick="gotoLevels()">‹</button>
      <div class="g-mid">
        <div class="g-lvlnum" id="gLvlNum">Level 1</div>
        <div class="g-worldname" id="gWorldName">🌲 Forest</div>
      </div>
      <div class="g-right">
        <div class="g-coins">🪙<span id="gCoins">0</span></div>
        <button class="g-hintbtn" onclick="useHint()">💡</button>
      </div>
    </div>
    <div class="g-cw"><div class="cwgrid" id="cwgrid"></div></div>
    <div class="g-pills" id="gpills"></div>
    <div class="g-wheel">
      <div class="g-typed" id="gTyped"></div>
      <div class="wheelwrap" id="wheelwrap">
        <svg id="wsvg"></svg>
        <div id="wdiv"></div>
        <button class="wshuf" id="wshuf" onclick="doShuffle()">🔀</button>
      </div>
      <div class="g-actrow">
        <button class="g-act" onclick="clearSel()">✕</button>
        <button class="g-act" onclick="submitWord()">✓</button>
      </div>
    </div>
  </div>

  <!-- ── WIN ── -->
  <div id="sWin" class="scr">
    <div class="w-trophy">🏆</div>
    <div class="w-title">BRILLIANT!</div>
    <div class="w-sub" id="wSub">Level complete!</div>
    <div class="w-earncoins" id="wCoins">+50 🪙</div>
    <button class="w-nextbtn" onclick="nextLevel()">Next Level ▶</button>
    <button class="w-mapbtn" onclick="gotoLevels()">Level Map</button>
  </div>

</div>
<div id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════════
   AUDIO ENGINE — Güçlü ses sistemi
══════════════════════════════════════════════════ */
let AC=null, masterGain=null, compressor=null, musicOn=true, bgTimer=null;

function getAC(){
  if(!AC){
    AC=new(window.AudioContext||window.webkitAudioContext)();
    compressor=AC.createDynamicsCompressor();
    compressor.threshold.value=-3;
    compressor.knee.value=1;
    compressor.ratio.value=3;
    compressor.attack.value=0.001;
    compressor.release.value=0.08;
    masterGain=AC.createGain();
    masterGain.gain.value=5.0;
    masterGain.connect(compressor);
    compressor.connect(AC.destination);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}

/* Tek nota — güçlü */
function beep(freq,type,dur,vol,delay=0){
  try{
    const ctx=getAC();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g); g.connect(masterGain);
    o.type=type; o.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+.018);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t); o.stop(t+dur+.05);
  }catch(e){}
}

/* Harmonik nota — arka plan müziği için
   Ana frekans + oktav + 5. ses = dolgun, güçlü ses */
function richNote(freq, dur, vol, delay=0){
  try{
    const ctx=getAC();
    const t=ctx.currentTime+delay;

    // Ana ses (sine)
    const o1=ctx.createOscillator();
    const g1=ctx.createGain();
    o1.connect(g1); g1.connect(masterGain);
    o1.type='sine'; o1.frequency.value=freq;
    g1.gain.setValueAtTime(0,t);
    g1.gain.linearRampToValueAtTime(vol,t+.03);
    g1.gain.exponentialRampToValueAtTime(.001,t+dur);
    o1.start(t); o1.stop(t+dur+.05);

    // Üst oktav (triangle) — dolgunluk
    const o2=ctx.createOscillator();
    const g2=ctx.createGain();
    o2.connect(g2); g2.connect(masterGain);
    o2.type='triangle'; o2.frequency.value=freq*2;
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(vol*.5,t+.03);
    g2.gain.exponentialRampToValueAtTime(.001,t+dur);
    o2.start(t); o2.stop(t+dur+.05);

    // 5. harmonik (sine) — zenginlik
    const o3=ctx.createOscillator();
    const g3=ctx.createGain();
    o3.connect(g3); g3.connect(masterGain);
    o3.type='sine'; o3.frequency.value=freq*1.5;
    g3.gain.setValueAtTime(0,t);
    g3.gain.linearRampToValueAtTime(vol*.35,t+.03);
    g3.gain.exponentialRampToValueAtTime(.001,t+dur);
    o3.start(t); o3.stop(t+dur+.05);
  }catch(e){}
}

/* ── ARKA PLAN MÜZİĞİ — harmonik, güçlü ── */
const BG_MELODY=[
  261,329,392,523,
  392,329,261,329,
  392,523,659,523,
  392,330,294,261
];
const BG_BASS=[
  130,130,196,196,
  196,196,130,130,
  196,196,196,196,
  196,165,147,130
];
let bgIdx=0;
function startBG(){
  if(!musicOn||bgTimer) return;
  const tick=()=>{
    if(!musicOn){bgTimer=null;return;}
    const i=bgIdx%BG_MELODY.length;
    // Melodi — harmonik nota
    richNote(BG_MELODY[i], .55, .65);
    // Bas — daha güçlü, dolgun
    richNote(BG_BASS[i], .55, .5);
    bgIdx++;
    bgTimer=setTimeout(tick,380);
  };
  bgTimer=setTimeout(tick,400);
}
function stopBG(){clearTimeout(bgTimer);bgTimer=null;}
function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('musicBtn').textContent=musicOn?'🎵':'🔇';
  musicOn?startBG():stopBG();
  persist();
}

const SAVE_KEY='wsj5';
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');}catch(e){return {};}}
function persist(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({done:[...G.done],coins:G.coins,music:musicOn}));}catch(e){}
}

  if(valid.length < 2) valid.push(letters.slice(0,3).join(''));
  return {letters, w:valid, b:bonus};
});

function buildMap(){
  const body = document.getElementById('lmBody');
  body.innerHTML = '';
  const maxUnlocked = G.done.size; // 0 tamamlandıysa sadece 0.level açık

  WORLDS.forEach(world => {
    // kart
    const card = document.createElement('div');
    card.className = 'world-card';

    // başlık
    const label = document.createElement('div');
    label.className = 'world-label';
    label.innerHTML =
      `<span class="wicon">${world.icon}</span>`+
      `<span class="wname">${world.name}</span>`+
      `<span class="wrange">Lv ${world.s+1}–${world.e+1}</span>`;
    card.appendChild(label);

    // grid
    const grid = document.createElement('div');
    grid.className = 'lvl-grid';

    for(let i = world.s; i <= world.e; i++){
      const btn = document.createElement('button');
      btn.className = 'lvlbtn';

      const isDone     = G.done.has(i);
      const isUnlocked = (i <= maxUnlocked);

      if(isDone){
        btn.classList.add('done');
        btn.innerHTML = `${i+1}<span class="star">⭐</span>`;
      } else if(isUnlocked){
        btn.classList.add('open');
        btn.textContent = i+1;
      } else {
        btn.classList.add('lock');
        btn.textContent = '🔒';
      }

      if(isUnlocked){
        btn.addEventListener('click', ()=>{ SFX.tick(); gotoGame(i); });
      }
      grid.appendChild(btn);
    }
    card.appendChild(grid);
    body.appendChild(card);
  });
}

/* ══════════════════════════════════════════════════
   CROSSWORD LAYOUT
══════════════════════════════════════════════════ */
function calcLayout(words){
  const grid={}, placed=[];
  const K=(r,c)=>r+','+c;
  function put(word,row,col,horiz){
    const cells=[];
    for(let i=0;i<word.length;i++){
      const r=horiz?row:row+i, c=horiz?col+i:col;
      cells.push({r,c,ch:word[i]}); grid[K(r,c)]=word[i];
    }
    placed.push({word,cells,horiz});
  }
  const sorted=[...words].sort((a,b)=>b.length-a.length);
  if(!sorted.length) return{placed:[],grid:{},minR:0,minC:0,rows:2,cols:4};
  put(sorted[0], 0, -Math.floor(sorted[0].length/2), true);
  for(let wi=1;wi<sorted.length;wi++){
    const word=sorted[wi]; let ok=false;
    outer:for(const pl of placed){
      for(let pi=0;pi<pl.word.length&&!ok;pi++){
        for(let wi2=0;wi2<word.length&&!ok;wi2++){
          if(pl.word[pi]!==word[wi2]) continue;
          const h=!pl.horiz;
          const r=h?pl.cells[pi].r:pl.cells[pi].r-wi2;
          const c=h?pl.cells[pi].c-wi2:pl.cells[pi].c;
          let valid=true;
          for(let j=0;j<word.length;j++){
            const rj=h?r:r+j, cj=h?c+j:c;
            if(grid[K(rj,cj)]&&grid[K(rj,cj)]!==word[j]){valid=false;break;}
          }
          if(valid){put(word,r,c,h);ok=true;break outer;}
        }
      }
    }
    if(!ok){
      const last=placed[placed.length-1];
      const br=last.cells[last.cells.length-1].r+2;
      put(word, br, -Math.floor(word.length/2), true);
    }
  }
  let minR=1e9,minC=1e9,maxR=-1e9,maxC=-1e9;
  Object.keys(grid).forEach(k=>{
    const[r,c]=k.split(',').map(Number);
    minR=Math.min(minR,r);minC=Math.min(minC,c);
    maxR=Math.max(maxR,r);maxC=Math.max(maxC,c);
  });
  return{placed,grid,minR,minC,maxR,maxC,rows:maxR-minR+1,cols:maxC-minC+1};
}

/* ══════════════════════════════════════════════════
   LOAD LEVEL
══════════════════════════════════════════════════ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}

function loadLvl(idx){
  const lvl   = LEVELS[idx];
  const world = WORLDS.find(w=>idx>=w.s&&idx<=w.e)||WORLDS[0];
  document.getElementById('gLvlNum').textContent   = 'Level '+(idx+1);
  document.getElementById('gWorldName').textContent = world.icon+' '+world.name;
  document.getElementById('gCoins').textContent     = G.coins;
  G.validW  = new Set(lvl.w);
  G.bonusW  = new Set(lvl.b||[]);
  G.letters = [...lvl.letters]; shuffle(G.letters);
  G.layout  = calcLayout([...G.validW]);
  renderCW(); renderPills(); buildWheel();
}

/* ══════════════════════════════════════════════════
   RENDER CROSSWORD
══════════════════════════════════════════════════ */
function renderCW(){
  const {placed,grid,minR,minC,rows,cols}=G.layout;
  const cw = document.getElementById('cwgrid');
  const avail = Math.min(document.getElementById('app').offsetWidth||375, 430)-20;
  const cs    = Math.max(20, Math.min(36, Math.floor(avail/Math.max(cols,4))));
  cw.style.gridTemplateColumns=`repeat(${cols},${cs}px)`;
  cw.innerHTML='';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ch=grid[(minR+r)+','+(minC+c)];
      const el=document.createElement('div');
      el.className='cell';
      el.style.cssText=`width:${cs}px;height:${cs}px;font-size:${Math.max(9,cs-14)}px`;
      if(!ch){ el.classList.add('emp'); }
      else{
        const st=cellSt(minR+r,minC+c,placed);
        if(st==='bon'){el.classList.add('bon');el.textContent=ch;}
        else if(st==='fnd'){el.classList.add('fnd');el.textContent=ch;}
        else{el.classList.add('blk');}
      }
      cw.appendChild(el);
    }
  }
}
function cellSt(r,c,placed){
  for(const pl of placed){
    if(G.found.has(pl.word)||G.foundB.has(pl.word)){
      for(const cell of pl.cells){
        if(cell.r===r&&cell.c===c) return G.foundB.has(pl.word)?'bon':'fnd';
      }
    }
  }
  return 'blk';
}

/* ══════════════════════════════════════════════════
   RENDER PILLS
══════════════════════════════════════════════════ */
function renderPills(){
  const cont=document.getElementById('gpills'); cont.innerHTML='';
  G.validW.forEach(w=>{
    const p=document.createElement('div');
    const found=G.found.has(w);
    p.className='pill '+(found?'pf':'ph');
    p.textContent=found?w:'_'.repeat(w.length);
    cont.appendChild(p);
  });
  G.bonusW.forEach(w=>{
    if(G.foundB.has(w)){
      const p=document.createElement('div');
      p.className='pill pb'; p.textContent='★ '+w;
      cont.appendChild(p);
    }
  });
}

/* ══════════════════════════════════════════════════
   BUILD WHEEL
══════════════════════════════════════════════════ */
function buildWheel(){
  const wd   = document.getElementById('wdiv');
  const svg  = document.getElementById('wsvg');
  const wrap = document.getElementById('wheelwrap');
  const shuf = document.getElementById('wshuf');
  wd.innerHTML=''; svg.innerHTML='';

  const appW  = Math.min(document.getElementById('app').offsetWidth||375, 430);
  const wSize = Math.min(appW-32, 210);
  const bSz   = Math.max(36, Math.min(52, wSize/4.6));
  const sSz   = Math.min(48, Math.max(34, wSize/4.6));
  const rad   = (wSize/2)*0.76;
  const cx=wSize/2, cy=wSize/2;

  wrap.style.width=wrap.style.height=wSize+'px';
  svg.setAttribute('width',wSize); svg.setAttribute('height',wSize);
  wd.style.width=wd.style.height=wSize+'px';
  shuf.style.width=shuf.style.height=sSz+'px';
  shuf.style.fontSize=(sSz*.42)+'px';

  G.positions=[];
  const n=G.letters.length;
  G.letters.forEach((ch,i)=>{
    const a=(2*Math.PI*i/n)-Math.PI/2;
    const x=cx+rad*Math.cos(a), y=cy+rad*Math.sin(a);
    G.positions.push({x,y});
    const btn=document.createElement('button');
    btn.className='wletter'; btn.id='wb'+i; btn.textContent=ch;
    btn.style.cssText=`left:${x}px;top:${y}px;width:${bSz}px;height:${bSz}px;font-size:${bSz*.38}px`;
    btn.addEventListener('pointerdown',e=>{e.preventDefault();startDrag(i);},{passive:false});
    wd.appendChild(btn);
  });
  wd.addEventListener('pointermove', onMove, {passive:false});
  wd.addEventListener('pointerup',   onEnd,  {passive:false});
  wd.addEventListener('pointercancel',onEnd, {passive:false});
}

/* ── DRAG ── */
function startDrag(i){
  if(G.sel.includes(i)) return;
  G.sel=[i]; SFX.tick(); updateWheel();
}
function onMove(e){
  e.preventDefault();
  if(!G.sel.length) return;
  const rect=document.getElementById('wdiv').getBoundingClientRect();
  const pt=e.touches?e.touches[0]:e;
  const mx=pt.clientX-rect.left, my=pt.clientY-rect.top;
  let best=-1, bestD=34;
  G.positions.forEach((p,i)=>{
    const d=Math.hypot(p.x-mx,p.y-my);
    if(d<bestD){bestD=d;best=i;}
  });
  if(best>=0&&!G.sel.includes(best)){G.sel.push(best);SFX.tick();updateWheel();}
}
function onEnd(e){
  if(e) e.preventDefault();
  if(G.sel.length>1) submitWord();
  else{ G.sel=[]; updateWheel(); }
}
function updateWheel(){
  G.letters.forEach((_,i)=>{
    const b=document.getElementById('wb'+i);
    if(b) b.classList.toggle('sel',G.sel.includes(i));
  });
  const svg=document.getElementById('wsvg'); svg.innerHTML='';
  for(let i=1;i<G.sel.length;i++){
    const a=G.positions[G.sel[i-1]], b=G.positions[G.sel[i]];
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',a.x);ln.setAttribute('y1',a.y);
    ln.setAttribute('x2',b.x);ln.setAttribute('y2',b.y);
    ln.setAttribute('stroke','#f5c842');ln.setAttribute('stroke-width','3.5');
    ln.setAttribute('stroke-linecap','round');ln.setAttribute('opacity','0.8');
    svg.appendChild(ln);
  }
  const tw=document.getElementById('gTyped'); tw.innerHTML='';
  G.sel.forEach(i=>{
    const s=document.createElement('div'); s.className='tletter'; s.textContent=G.letters[i];
    tw.appendChild(s);
  });
}
function clearSel(){ G.sel=[]; updateWheel(); }
function doShuffle(){ SFX.shuf(); shuffle(G.letters); G.sel=[]; buildWheel(); }

/* ══════════════════════════════════════════════════
   SUBMIT
══════════════════════════════════════════════════ */
function submitWord(){
  const word=G.sel.map(i=>G.letters[i]).join('');
  G.sel=[]; updateWheel();
  if(word.length<2){ toast('Too short! 🤏','tr'); return; }
  if(G.found.has(word)||G.foundB.has(word)){ toast('Already found!','tr'); return; }
  if(G.validW.has(word)){
    G.found.add(word);
    const earn=word.length*5; G.coins+=earn;
    document.getElementById('gCoins').textContent=G.coins;
    SFX.good(); renderCW(); renderPills();
    toast('✓  '+word+'  +'+earn+'🪙','tg');
    persist(); checkWin();
  } else if(G.bonusW.has(word)){
    G.foundB.add(word);
    const earn=word.length*10; G.coins+=earn;
    document.getElementById('gCoins').textContent=G.coins;
    SFX.bonus(); renderCW(); renderPills();
    toast('🌟 BONUS!  +'+earn+'🪙','tb');
    persist();
  } else {
    SFX.bad(); toast('Not a word ✗','tr');
  }
}

/* ══════════════════════════════════════════════════
   HINT
══════════════════════════════════════════════════ */
function useHint(){
  if(G.coins<20){ toast('Need 20🪙 for hint!','tr'); return; }
  for(const w of G.validW){
    if(!G.found.has(w)){
      G.coins-=20; document.getElementById('gCoins').textContent=G.coins;
      SFX.hint();
      toast('💡 Starts with "'+w[0]+'"','tg');
      G.letters.forEach((ch,i)=>{
        if(ch===w[0]){
          const btn=document.getElementById('wb'+i);
          if(btn){btn.style.boxShadow='0 0 20px #4facfe';setTimeout(()=>btn.style.boxShadow='',2000);}
        }
      });
      persist(); return;
    }
  }
  toast('All words found!','tg');
}

/* ══════════════════════════════════════════════════
   WIN
══════════════════════════════════════════════════ */
function checkWin(){
  if([...G.validW].every(w=>G.found.has(w))){
    G.done.add(G.cur);
    const earn=G.validW.size*20+G.foundB.size*50;
    G.coins+=earn; persist();
    setTimeout(()=>{
      SFX.win();
      document.getElementById('wSub').textContent='Level '+(G.cur+1)+' complete! 🎉';
      document.getElementById('wCoins').textContent='+'+earn+' 🪙  Total: '+G.coins;
      show('sWin');
    },500);
  }
}
function nextLevel(){
  const n=G.cur+1;
  if(n<1000) gotoGame(n); else gotoLevels();
}

let tT;
function toast(msg,cls='tg'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=cls;
  requestAnimationFrame(()=>el.classList.add('on'));
  clearTimeout(tT); tT=setTimeout(()=>el.classList.remove('on'),1600);
}

// Parçacık sistemi
const PARTICLES=[];
let bgTheme=BG_THEMES.default;
let bgAnim=null;
let bgTime=0;

function initBG(){
  const cvs=document.getElementById('bgCanvas');
  function resize(){
    cvs.width  = Math.min(window.innerWidth, 430);
    cvs.height = window.innerHeight;
    PARTICLES.length=0;
    spawnParticles();
  }
  resize();
  window.addEventListener('resize', resize);
  renderBG();
}

function setWorldBG(worldIdx){
  bgTheme=BG_THEMES[worldIdx]||BG_THEMES.default;
  PARTICLES.length=0;
  spawnParticles();
}

function spawnParticles(){
  const cvs=document.getElementById('bgCanvas');
  const count=bgTheme.snow?60:bgTheme.stars?40:30;
  for(let i=0;i<count;i++){
    const col=bgTheme.particles[Math.floor(Math.random()*bgTheme.particles.length)];
    PARTICLES.push({
      x:Math.random()*cvs.width,
      y:Math.random()*cvs.height,
      r:Math.random()*2.5+0.5,
      vx:(Math.random()-.5)*0.4,
      vy:bgTheme.snow?Math.random()*0.8+0.3:Math.random()*-0.5-0.1,
      alpha:Math.random()*.7+.3,
      col,
      twinkle:Math.random()*Math.PI*2,
      twinkleSpeed:Math.random()*.04+.01,
      type: bgTheme.snow?'snow': bgTheme.stars?'star':'dust'
    });
  }
}

function renderBG(){
  const cvs=document.getElementById('bgCanvas');
  const ctx=cvs.getContext('2d');
  const W=cvs.width, H=cvs.height;
  bgTime+=0.008;

  // Gökyüzü gradyanı
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,bgTheme.top);
  grad.addColorStop(1,bgTheme.bot);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Bulutlar
  if(bgTheme.clouds){
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.06)';
    for(let i=0;i<4;i++){
      const cx=((bgTime*15*(i+1)*0.3)%(W+200))-100;
      const cy=H*0.15+i*H*0.08;
      const r=40+i*15;
      ctx.beginPath();
      ctx.ellipse(cx,cy,r*2,r*.6,0,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx+r*.7,cy-r*.3,r*1.4,r*.5,0,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx-r*.7,cy-r*.2,r*1.2,r*.45,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Dalgalar (okyanus/cove)
  if(bgTheme.waves){
    ctx.save();
    for(let w=0;w<3;w++){
      ctx.beginPath();
      ctx.strokeStyle=`rgba(255,255,255,${0.06+w*0.03})`;
      ctx.lineWidth=1.5;
      for(let x=0;x<=W;x+=4){
        const y=H*(0.55+w*0.12)+Math.sin(x/60+bgTime*2+w*1.5)*8;
        w===0&&x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // Lav parıltısı (volkan/inferno)
  if(bgTheme.lava){
    ctx.save();
    for(let i=0;i<5;i++){
      const lx=W*(0.1+i*0.2);
      const ly=H*(0.75+Math.sin(bgTime+i)*0.04);
      const lr=20+Math.sin(bgTime*2+i)*8;
      const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,lr);
      lg.addColorStop(0,'rgba(255,100,0,0.25)');
      lg.addColorStop(1,'rgba(255,0,0,0)');
      ctx.fillStyle=lg;
      ctx.beginPath();ctx.arc(lx,ly,lr,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // Şimşek (storm)
  if(bgTheme.lightning&&Math.random()<0.004){
    ctx.save();
    ctx.strokeStyle='rgba(180,200,255,0.7)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    const lx=Math.random()*W;
    ctx.moveTo(lx,0);
    let cy2=0;
    while(cy2<H*0.6){
      cy2+=Math.random()*40+20;
      ctx.lineTo(lx+(Math.random()-.5)*30,cy2);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Zemin rengi (alt şerit)
  if(bgTheme.ground){
    const groundH=H*0.12;
    const gg=ctx.createLinearGradient(0,H-groundH,0,H);
    gg.addColorStop(0,'transparent');
    gg.addColorStop(1,bgTheme.ground);
    ctx.fillStyle=gg;
    ctx.fillRect(0,H-groundH,W,groundH);
  }

  // Parçacıklar / yıldızlar / kar
  PARTICLES.forEach(p=>{
    p.twinkle+=p.twinkleSpeed;
    const alpha=p.alpha*(0.6+0.4*Math.sin(p.twinkle));

    ctx.save();
    ctx.globalAlpha=alpha;

    if(p.type==='snow'){
      // Kar tanesi
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      p.x+=p.vx+Math.sin(bgTime+p.y/30)*0.3;
      p.y+=p.vy;
      if(p.y>cvs.height+5){p.y=-5;p.x=Math.random()*cvs.width;}
    } else if(p.type==='star'){
      // Yıldız
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      // Parlak yıldız efekti
      if(p.r>1.8){
        ctx.strokeStyle=p.col;ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(p.x-p.r*3,p.y);ctx.lineTo(p.x+p.r*3,p.y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(p.x,p.y-p.r*3);ctx.lineTo(p.x,p.y+p.r*3);ctx.stroke();
      }
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-5)p.y=cvs.height+5;
      if(p.x<0)p.x=cvs.width;
      if(p.x>cvs.width)p.x=0;
    } else {
      // Toz/ateş parçacığı
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-5){p.y=cvs.height+5;p.x=Math.random()*cvs.width;}
    }
    ctx.restore();
  });

  bgAnim=requestAnimationFrame(renderBG);
}

function updateBGForLevel(levelIdx){
  const w=WORLDS.findIndex(w=>levelIdx>=w.s&&levelIdx<=w.e);
  setWorldBG(w>=0?w:0);
}
